port=0
interface=br0
bind-dynamic

dhcp-range=192.168.10.170,192.168.10.190,255.255.255.0,12h
dhcp-option=option:router,192.168.10.1
dhcp-option=option:dns-server,10.0.80.8,10.0.80.10

# BIOS PXE
dhcp-match=set:bios,option:client-arch,0
dhcp-boot=tag:bios,undionly.kpxe,terminal-server,192.168.10.100

# UEFI PXE
dhcp-match=set:efi-x86_64,option:client-arch,7
dhcp-boot=tag:efi-x86_64,ipxe.efi,terminal-server,192.168.10.100

# iPXE chainload
dhcp-match=set:ipxe,175
dhcp-boot=tag:ipxe,ltsp/ltsp.ipxe,terminal-server,192.168.10.100

log-dhcp
log-facility=/var/log/dnsmasq.log
